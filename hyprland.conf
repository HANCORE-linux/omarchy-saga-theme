# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

general {
    col.active_border = rgba(f8eae7ee) rgba(4b4c4dee) 180deg 
    col.inactive_border = rgb(4b4c4d)
    gaps_in = 4
    gaps_out = 8
    border_size = 1
}

group {
    col.border_active = $activeBorderColor
}


decoration {
    rounding = 12
    rounding_power = 4
      shadow {
      enabled = yes
      render_power = 6
      range = 20
      color = rgba(05080a99)
    }
}